name: Laravel CI — Lint & Test

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ============================================================
#  GLOBAL ENVIRONMENT
# ============================================================
env:
  PHP_VERSION: '8.3'
  NODE_VERSION: '20'
  DB_DATABASE: laravel_test
  DB_USERNAME: root
  DB_PASSWORD: ''

# ============================================================
#  JOBS
# ============================================================
jobs:

  # ----------------------------------------------------------
  #  1. PHP LINT — Syntax Check
  # ----------------------------------------------------------
  php-lint:
    name: PHP Lint (Syntax Check)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, json, bcmath
          coverage: none
          tools: parallel-lint

      - name: Check PHP syntax (parallel-lint)
        run: parallel-lint --exclude vendor --exclude node_modules .

  # ----------------------------------------------------------
  #  2. CODE STYLE — Laravel Pint
  # ----------------------------------------------------------
  code-style:
    name: Code Style (Laravel Pint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, json, bcmath
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run Laravel Pint (dry-run)
        run: ./vendor/bin/pint --test

  # ----------------------------------------------------------
  #  3. STATIC ANALYSIS — PHPStan / Larastan
  # ----------------------------------------------------------
  static-analysis:
    name: Static Analysis (Larastan)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, json, bcmath
          coverage: none
          tools: phpstan

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run Larastan
        run: ./vendor/bin/phpstan analyse --memory-limit=512M

  # ----------------------------------------------------------
  #  4. JAVASCRIPT LINT — ESLint
  # ----------------------------------------------------------
  js-lint:
    name: JS Lint (ESLint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

  # ----------------------------------------------------------
  #  5. UNIT & FEATURE TESTS — PHPUnit / Pest
  # ----------------------------------------------------------
  tests:
    name: Tests (PHPUnit / Pest)
    runs-on: ubuntu-latest
    needs: [ php-lint, code-style ]

    strategy:
      fail-fast: false
      matrix:
        php: [ '8.2', '8.3' ]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: ${{ env.DB_DATABASE }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, ctype, json, bcmath, pdo_mysql, redis
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-php${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-php${{ matrix.php }}-
            composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm dependencies & build assets
        run: |
          npm ci
          npm run build

      - name: Copy .env file
        run: cp .env.example .env

      - name: Configure test environment
        run: |
          php artisan key:generate
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_PORT=.*/DB_PORT=3306/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=${{ env.DB_DATABASE }}/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=${{ env.DB_USERNAME }}/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=${{ env.DB_PASSWORD }}/' .env
          sed -i 's/CACHE_DRIVER=.*/CACHE_DRIVER=redis/' .env
          sed -i 's/REDIS_HOST=.*/REDIS_HOST=127.0.0.1/' .env

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run test suite
        run: php artisan test --parallel --coverage-clover=coverage.xml

      - name: Upload coverage report to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.php == '8.3'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ----------------------------------------------------------
  #  6. SECURITY AUDIT
  # ----------------------------------------------------------
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none

      - name: Audit Composer dependencies
        run: |
          composer install --no-interaction --prefer-dist --no-progress
          composer audit

      - name: Audit npm dependencies
        run: |
          npm ci
          npm audit --audit-level=high

  # ----------------------------------------------------------
  #  7. CI STATUS SUMMARY
  # ----------------------------------------------------------
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [ php-lint, code-style, static-analysis, js-lint, tests, security ]
    if: always()

    steps:
      - name: Check all job statuses
        run: |
          echo "php-lint        : ${{ needs.php-lint.result }}"
          echo "code-style      : ${{ needs.code-style.result }}"
          echo "static-analysis : ${{ needs.static-analysis.result }}"
          echo "js-lint         : ${{ needs.js-lint.result }}"
          echo "tests           : ${{ needs.tests.result }}"
          echo "security        : ${{ needs.security.result }}"

          if [[ "${{ needs.php-lint.result }}"        == "failure" || \
                "${{ needs.code-style.result }}"      == "failure" || \
                "${{ needs.static-analysis.result }}" == "failure" || \
                "${{ needs.js-lint.result }}"         == "failure" || \
                "${{ needs.tests.result }}"           == "failure" || \
                "${{ needs.security.result }}"        == "failure" ]]; then
            echo "One or more jobs failed!"
            exit 1
          fi

          echo "✅ All jobs passed!"
